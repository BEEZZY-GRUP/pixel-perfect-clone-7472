<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beezzy Group Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" onerror="console.warn('Chart.js failed to load')"></script>
<style>
:root{
  --bg:#060604;--bg2:#0c0c08;--card:#0e0e0a;--card2:#141410;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#F2F0E8;--muted:rgba(242,240,232,0.42);--muted2:rgba(242,240,232,0.22);
  --accent:#FFD600;--accent2:#E6C200;--ag:rgba(255,214,0,0.12);
  --green:#16A34A;--gbg:rgba(22,163,74,0.11);
  --red:#EF4444;--rbg:rgba(239,68,68,0.11);
  --amber:#F59E0B;--abg:rgba(245,158,11,0.11);
  --blue:#3B82F6;--bbg:rgba(59,130,246,0.11);
  --purple:#A855F7;--pbg:rgba(168,85,247,0.11);
  --r:10px;--rs:6px;--sw:238px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}
input,select,textarea,button{font-family:'DM Sans',sans-serif;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;}
.lc{width:400px;background:var(--card);border:0.5px solid var(--border2);border-radius:16px;padding:48px 40px;}
.llogo{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px;}
.llogo em{background:linear-gradient(90deg,#FFD600,#E6C200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal;}
.lsub{font-size:11px;color:var(--muted);margin-bottom:32px;letter-spacing:.04em;}
.ll{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.li{width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--rs);padding:10px 14px;font-size:14px;color:var(--text);outline:none;margin-bottom:14px;transition:border-color .2s;}
.li:focus{border-color:var(--accent);}
.lb{width:100%;padding:11px;background:linear-gradient(90deg,#FFD600,#E6C200);border:none;border-radius:var(--rs);font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;color:#000;cursor:pointer;margin-top:4px;transition:opacity .2s;}
.lb:hover{opacity:.9;}
.lerr{font-size:12px;color:var(--red);margin-top:10px;display:none;}
.lhint{margin-top:20px;padding-top:16px;border-top:0.5px solid var(--border);font-size:11px;color:var(--muted);}
.lhint strong{color:var(--accent);display:block;margin-bottom:8px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;}
.lhr{display:flex;justify-content:space-between;padding:4px 0;}

/* APP */
#app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sb{width:var(--sw);background:#070707;border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sb-logo{padding:20px 16px 14px;border-bottom:0.5px solid var(--border);}
.sb-brand{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;letter-spacing:-.01em;}
.sb-brand em{background:linear-gradient(90deg,#FFD600,#E6C200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal;}
.sb-sub{font-size:9px;color:var(--muted2);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.sb-sec{padding:12px 8px 4px;}
.sb-lbl{font-size:9px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;padding:0 8px;margin-bottom:4px;}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:all .15s;border-left:2px solid transparent;margin-bottom:1px;user-select:none;position:relative;}
.ni:hover{color:var(--text);background:rgba(255,255,255,0.03);}
.ni.active{color:var(--text);border-left-color:var(--accent);background:var(--ag);}
.ni svg{width:13px;height:13px;opacity:.45;flex-shrink:0;}
.ni.active svg{opacity:1;}
.ni .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.15);flex-shrink:0;}
.ni.active .dot{background:var(--accent);}
.ni .bc{margin-left:auto;font-size:9px;background:var(--red);color:#fff;padding:1px 5px;border-radius:10px;font-weight:700;min-width:16px;text-align:center;}
.ni .bc-a{background:var(--amber);}
.ni .hbadge{font-size:8px;background:linear-gradient(90deg,#FFD600,#E6C200);color:#000;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:auto;}
.sb-footer{margin-top:auto;border-top:0.5px solid var(--border);padding:10px 8px;}
.sb-user{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;cursor:pointer;transition:background .15s;}
.sb-user:hover{background:rgba(255,255,255,0.03);}
.ava{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;font-family:'Montserrat',sans-serif;flex-shrink:0;}
.sb-uname{font-size:12px;font-weight:500;}
.sb-urole{font-size:9px;color:var(--muted2);margin-top:1px;}
.sb-co-tag{display:inline-flex;align-items:center;gap:3px;font-size:8px;padding:1px 6px;border-radius:3px;margin-top:3px;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:48px;background:#070707;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;}
.bc{display:flex;align-items:center;gap:6px;font-size:12px;}
.bc-p{color:var(--muted);}
.bc-s{color:var(--muted2);}
.bc-a{color:var(--text);font-weight:500;}
.tb-r{display:flex;align-items:center;gap:6px;}
.tbb{display:flex;align-items:center;gap:5px;padding:5px 10px;border:0.5px solid var(--border2);border-radius:6px;background:transparent;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;}
.tbb:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.tbb.acc{background:linear-gradient(90deg,#FFD600,#E6C200);border-color:transparent;color:#000;font-weight:600;}
.tbb.acc:hover{opacity:.9;}
.notif-wrap{position:relative;}
.notif-dot{position:absolute;top:0;right:0;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid #070707;}

/* DATE FILTER */
.dfbar{display:flex;align-items:center;gap:6px;padding:7px 20px;background:#070707;border-bottom:0.5px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.dflbl{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;}
.dfg{display:flex;gap:2px;}
.dfb{padding:4px 10px;border-radius:5px;font-size:11px;color:var(--muted);cursor:pointer;border:0.5px solid transparent;background:transparent;transition:all .15s;}
.dfb:hover{color:var(--text);background:rgba(255,255,255,.04);}
.dfb.active{color:#000;background:linear-gradient(90deg,#FFD600,#E6C200);font-weight:500;}
.dfd{width:0.5px;height:14px;background:var(--border2);margin:0 4px;}
.dfdi{background:rgba(255,255,255,.04);border:0.5px solid var(--border2);border-radius:5px;padding:4px 8px;font-size:11px;color:var(--text);outline:none;color-scheme:dark;transition:border-color .2s;}
.dfdi:focus{border-color:var(--accent);}
.dfap{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;border:0.5px solid var(--accent);color:var(--accent);background:var(--ag);cursor:pointer;transition:all .15s;}
.dfap:hover{background:rgba(245,197,24,.2);}
.df-tag{font-size:11px;color:var(--muted);margin-left:6px;}
.df-tag strong{color:var(--accent);font-weight:500;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:22px 24px;}
.pg-hdr{margin-bottom:20px;}
.pg-title{font-family:'Montserrat',sans-serif;font-size:19px;font-weight:600;letter-spacing:-.02em;margin-bottom:3px;}
.pg-sub{font-size:11px;color:var(--muted);}
.pg-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;padding:2px 8px;border-radius:4px;margin-left:8px;font-weight:600;vertical-align:middle;text-transform:uppercase;letter-spacing:.04em;}
.badge-holding{background:linear-gradient(90deg,rgba(245,197,24,.2),rgba(230,168,0,.15));color:var(--accent);border:0.5px solid rgba(245,197,24,.3);}
.badge-empresa{background:rgba(255,255,255,.06);color:var(--muted);}

/* TABS */
.tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:20px;overflow-x:auto;gap:0;flex-shrink:0;}
.tab{padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}

/* KPI */
.kg{display:grid;gap:10px;margin-bottom:18px;}
.kg-6{grid-template-columns:repeat(6,minmax(0,1fr));}
.kg-5{grid-template-columns:repeat(5,minmax(0,1fr));}
.kg-4{grid-template-columns:repeat(4,minmax(0,1fr));}
.kg-3{grid-template-columns:repeat(3,minmax(0,1fr));}
.kg-2{grid-template-columns:repeat(2,minmax(0,1fr));}
.kc{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 15px;transition:border-color .2s;}
.kc:hover{border-color:var(--border2);}
.kc-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;}
.kc-val{font-family:'Montserrat',sans-serif;font-size:19px;font-weight:600;margin-bottom:4px;letter-spacing:-.02em;}
.kc-val.acc{background:linear-gradient(90deg,#FFD600,#E6C200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.kc-val.pos{color:var(--green);}
.kc-val.neg{color:var(--red);}
.kc-d{font-size:10px;display:flex;align-items:center;gap:3px;}
.du{color:var(--green);}
.dd{color:var(--red);}
.dw{color:var(--amber);}
.db{color:var(--blue);}

/* CHARTS */
.cg{display:grid;gap:12px;margin-bottom:18px;}
.cg-2{grid-template-columns:1fr 1fr;}
.cg-3{grid-template-columns:1fr 1fr 1fr;}
.cg-21{grid-template-columns:2fr 1fr;}
.cc{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:15px 17px;}
.cc-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.cc-title{font-size:12.5px;font-weight:500;}
.cc-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.cw{position:relative;height:140px;}
.cw-sm{height:110px;}
.cw-lg{height:190px;}

/* STRATEGIC CASH */
.caixas-g{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.cx-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:15px 17px;}
.cx-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.cx-val{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:600;margin-bottom:9px;letter-spacing:-.02em;}
.cx-meta{font-size:10px;color:var(--muted);margin-bottom:5px;}
.pt{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.pf{height:100%;border-radius:2px;background:linear-gradient(90deg,#FFD600,#E6C200);}
.pf-warn{background:var(--amber);}
.pf-ok{background:var(--green);}
.pf-red{background:var(--red);}
.cx-foot{font-size:10px;color:var(--muted);margin-top:6px;}

/* TABLE */
.tc{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px;}
.tc-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;border-bottom:0.5px solid var(--border);flex-wrap:wrap;gap:8px;}
.tc-title{font-size:12.5px;font-weight:500;}
.tc-f{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.fi{background:var(--bg2);border:0.5px solid var(--border2);border-radius:5px;padding:5px 10px;font-size:11px;color:var(--text);outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--accent);}
.fs{background:var(--bg2);border:0.5px solid var(--border2);border-radius:5px;padding:5px 8px;font-size:11px;color:var(--muted);outline:none;cursor:pointer;}
table{width:100%;border-collapse:collapse;}
thead th{text-align:left;padding:7px 15px;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted2);background:rgba(255,255,255,.02);border-bottom:0.5px solid var(--border);}
tbody tr{border-bottom:0.5px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,.02);}
tbody td{padding:9px 15px;font-size:12px;}
.t-sum{display:flex;gap:18px;padding:10px 15px;border-top:0.5px solid var(--border);background:rgba(255,255,255,.01);font-size:11px;color:var(--muted);flex-wrap:wrap;}
.t-sum span{font-weight:500;}
.t-empty{text-align:center;padding:32px;color:var(--muted);font-size:12px;}

/* BADGES */
.b{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.b-holding{background:linear-gradient(90deg,rgba(245,197,24,.15),rgba(230,168,0,.1));color:var(--accent);border:0.5px solid rgba(245,197,24,.25);}
.b-beezzy{background:rgba(139,92,246,.12);color:#a78bfa;}
.b-palpita{background:rgba(236,72,153,.1);color:#f472b6;}
.b-starmind{background:rgba(245,197,24,.1);color:var(--accent);}
.b-pago,.b-ativo,.b-aprovado,.b-liquidado{background:var(--gbg);color:var(--green);}
.b-pendente,.b-ferias{background:var(--abg);color:var(--amber);}
.b-vencido,.b-inativo,.b-reprovado{background:var(--rbg);color:var(--red);}
.b-rascunho,.b-visualizador{background:rgba(255,255,255,.06);color:var(--muted);}
.b-admin{background:var(--ag);color:var(--accent);}
.b-financeiro{background:var(--bbg);color:var(--blue);}
.b-operacional{background:var(--pbg);color:var(--purple);}
.b-receita{background:var(--gbg);color:var(--green);}
.b-despesa{background:var(--rbg);color:var(--red);}
.b-transferencia{background:var(--bbg);color:var(--blue);}
.b-credit{background:var(--gbg);color:var(--green);}
.b-debit{background:var(--rbg);color:var(--red);}

/* FORM */
.fg{display:grid;gap:13px;margin-bottom:15px;}
.fg-2{grid-template-columns:1fr 1fr;}
.fg-3{grid-template-columns:1fr 1fr 1fr;}
.fg-4{grid-template-columns:1fr 1fr 1fr 1fr;}
.fgrp{display:flex;flex-direction:column;gap:5px;}
.flbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.finp,.fsel,.ftxt{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--rs);padding:8px 12px;font-size:13px;color:var(--text);outline:none;transition:border-color .2s;width:100%;}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:var(--accent);}
.finp[readonly]{color:var(--accent);font-weight:500;cursor:default;}
.finp.readonly-dim{color:var(--muted);cursor:default;}
.ftxt{resize:vertical;min-height:75px;}
.notice{border-left:3px solid var(--accent);background:var(--ag);border-radius:0 var(--rs) var(--rs) 0;padding:11px 14px;font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.notice strong{color:var(--accent);}
.notice-red{border-left-color:var(--red);background:var(--rbg);}
.notice-red strong{color:var(--red);}
.notice-blue{border-left-color:var(--blue);background:var(--bbg);}
.notice-blue strong{color:var(--blue);}
.notice-green{border-left-color:var(--green);background:var(--gbg);}
.notice-green strong{color:var(--green);}
.tax-box{border-left:3px solid var(--accent);background:var(--ag);border-radius:0 var(--rs) var(--rs) 0;padding:11px 15px;margin-bottom:16px;font-size:12px;color:var(--muted);display:flex;gap:20px;flex-wrap:wrap;align-items:center;}
.tax-box .tv{color:var(--text);font-weight:500;}
.tax-box .ta{color:var(--accent);font-weight:600;}
.upg{display:grid;gap:10px;margin-bottom:16px;}
.upg-3{grid-template-columns:repeat(3,1fr);}
.upg-2{grid-template-columns:repeat(2,1fr);}
.upb{border:1px dashed var(--border2);border-radius:var(--rs);padding:16px;text-align:center;cursor:pointer;transition:all .2s;}
.upb:hover{border-color:var(--accent);background:var(--ag);}
.upb-lbl{font-size:11px;font-weight:500;margin-bottom:2px;}
.upb-sub{font-size:10px;color:var(--muted);}
.upb-icon{opacity:.35;margin-bottom:8px;}
.fa{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:0.5px solid var(--border);}
.bp{padding:8px 20px;background:linear-gradient(90deg,#FFD600,#E6C200);border:none;border-radius:var(--rs);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;color:#000;cursor:pointer;transition:opacity .2s;}
.bp:hover{opacity:.9;}
.bp:active{transform:scale(.98);}
.bg-btn{padding:8px 16px;background:transparent;border:0.5px solid var(--border2);border-radius:var(--rs);font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;}
.bg-btn:hover{color:var(--text);border-color:var(--border);}
.bd-btn{padding:8px 16px;background:var(--rbg);border:0.5px solid rgba(239,68,68,.3);border-radius:var(--rs);font-size:12px;color:var(--red);cursor:pointer;}
.bd-btn:hover{background:rgba(239,68,68,.2);}
.bsm{padding:5px 12px;font-size:11px;}
.ib{background:none;border:none;cursor:pointer;color:var(--muted);transition:color .15s;padding:3px;border-radius:4px;}
.ib:hover{color:var(--text);background:rgba(255,255,255,.05);}
.sec-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:11px;padding-bottom:7px;border-bottom:0.5px solid var(--border);}
.max-w{max-width:680px;}
.max-w-sm{max-width:500px;}
.divider{height:0.5px;background:var(--border);margin:18px 0;}
.pr-row{margin-bottom:9px;}
.pr-labels{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:600;backdrop-filter:blur(2px);}
.modal{background:var(--card);border:0.5px solid var(--border2);border-radius:14px;padding:26px 30px;width:520px;max-width:95vw;max-height:88vh;overflow-y:auto;}
.modal-lg{width:680px;}
.modal-xl{width:820px;}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.mtitle{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;}
.mclose{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:0 4px;}
.mclose:hover{color:var(--text);}

/* TOGGLE */
.toggle{position:relative;width:30px;height:16px;flex-shrink:0;display:inline-block;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.tgl-track{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:8px;transition:background .2s;cursor:pointer;}
.toggle input:checked+.tgl-track{background:var(--accent);}
.tgl-thumb{position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;}
.toggle input:checked~.tgl-thumb{transform:translateX(14px);}

/* MISC */
.hidden{display:none!important;}
.flex{display:flex;align-items:center;}
.fb{display:flex;justify-content:space-between;align-items:center;}
.g8{gap:8px;}
.g12{gap:12px;}
.mt8{margin-top:8px;}
.mt16{margin-top:16px;}
.acc-txt{background:linear-gradient(90deg,#FFD600,#E6C200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.perm-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:0.5px solid var(--border);border-radius:6px;}
.perm-lbl{font-size:12px;}
.perm-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.stat-row:last-child{border-bottom:none;}
.stat-l{color:var(--muted);}
.stat-v{font-weight:500;}

/* BANK */
.bank-acct{background:var(--card2);border:0.5px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;}
.bank-acct-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.bank-acct-name{font-size:13px;font-weight:500;}
.bank-acct-num{font-size:10px;color:var(--muted);margin-top:2px;font-family:monospace;}
.bank-balance{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:600;}
.bank-balance.pos{color:var(--green);}
.bank-balance.neg{color:var(--red);}
.bank-tx-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.bank-tx-row:last-child{border-bottom:none;}
.bank-tx-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.tx-c{background:var(--gbg);color:var(--green);}
.tx-d{background:var(--rbg);color:var(--red);}
.tx-t{background:var(--bbg);color:var(--blue);}
.bank-tx-desc{flex:1;}
.bank-tx-val{font-weight:500;white-space:nowrap;}

/* NOTIFICATIONS */
.notif-item{display:flex;gap:12px;padding:14px 0;border-bottom:0.5px solid var(--border);}
.notif-item:last-child{border-bottom:none;}
.notif-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.notif-content{flex:1;}
.notif-msg{font-size:12px;font-weight:500;margin-bottom:3px;}
.notif-sub{font-size:11px;color:var(--muted);}
.notif-time{font-size:10px;color:var(--muted2);white-space:nowrap;}
.notif-unread{background:rgba(245,197,24,.05);border-left:2px solid var(--accent);padding-left:12px;margin-left:-12px;border-radius:0 4px 4px 0;}

/* TIMELINE */
.tl{position:relative;padding-left:18px;}
.tl::before{content:'';position:absolute;left:4px;top:0;bottom:0;width:0.5px;background:var(--border);}
.tl-item{position:relative;margin-bottom:16px;}
.tl-dot{position:absolute;left:-17px;top:3px;width:8px;height:8px;border-radius:50%;border:1.5px solid var(--bg);}
.tl-dot.acc{background:var(--accent);}
.tl-dot.green{background:var(--green);}
.tl-dot.red{background:var(--red);}
.tl-dot.blue{background:var(--blue);}
.tl-dot.gray{background:rgba(255,255,255,.2);}
.tl-title{font-size:12px;font-weight:500;margin-bottom:2px;}
.tl-sub{font-size:11px;color:var(--muted);}
.tl-date{font-size:10px;color:var(--muted2);margin-top:2px;}

/* PLAN */
.plan-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:15px 17px;margin-bottom:11px;}
.plan-card:hover{border-color:var(--border2);}
.plan-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.plan-title{font-size:13px;font-weight:500;}
.okr-card{background:var(--card2);border:0.5px solid var(--border);border-radius:8px;padding:13px 15px;margin-bottom:9px;}
.okr-obj{font-size:13px;font-weight:500;margin-bottom:10px;}
.okr-kr{display:flex;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:11px;gap:8px;}
.okr-kr:last-child{border-bottom:none;}
.okr-krl{color:var(--muted);flex:1;}
.okr-krv{font-weight:500;min-width:80px;text-align:right;}
.okr-bar{width:70px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.okr-fill{height:100%;background:var(--accent);border-radius:2px;}
.okr-pct{font-size:10px;color:var(--accent);min-width:30px;text-align:right;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none;z-index:9999;max-width:320px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast-ok{background:#16A34A;color:#fff;}
.toast-err{background:#EF4444;color:#fff;}
.toast-info{background:#3B82F6;color:#fff;}
.toast-warn{background:#F59E0B;color:#000;}
</style>

const fmt  = v => 'R$ ' + Math.round(v).toLocaleString('pt-BR');
const fmtK = v => v>=1000 ? 'R$ '+(v/1000).toFixed(v%1000===0?0:1).replace('.',',')+'k' : fmt(v);
const fmtD = s => { if(!s) return '—'; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; };
const fmtDT= s => s ? new Date(s).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
const pct  = (a,b) => b ? Math.min(Math.round(a/b*100),999) : 0;
const co   = id => DB.companies.find(c=>c.id===id);
const hasPerm = p => CU && (CU.perms==='all'||CU.perms===p||p==='view');

function destroyCharts(){ CHARTS.forEach(c=>{try{c.destroy();}catch(e){}}); CHARTS=[]; }
const CD = { grid:'rgba(255,255,255,0.04)', tick:{color:'rgba(255,255,255,0.28)',font:{size:10,family:'DM Sans'}} };
function mkChart(id,type,data,opts={}){
  if(typeof Chart === 'undefined') return null;
  const ctx=document.getElementById(id); if(!ctx) return null;
  try {
    const ch=new Chart(ctx,{type,data,options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:opts.leg||false,labels:{color:'rgba(255,255,255,.45)',font:{size:10,family:'DM Sans'},boxWidth:10,padding:10}}},
      scales:opts.noScale?{}:{
        x:{grid:{color:CD.grid},ticks:CD.tick},
        y:{grid:{color:CD.grid},ticks:{...CD.tick,callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v}}
      },
      ...(opts.extra||{})
    }});
    CHARTS.push(ch); return ch;
  } catch(e) { console.warn('Chart error:', e); return null; }
}

}

function doLogin(){
  const u=document.getElementById('l-u').value.trim();
  const p=document.getElementById('l-p').value;
  const usr=USERS_DB[u];
  if(usr&&usr.pass===p){
    CU={...usr,username:u};
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.remove('hidden');
    buildSidebar();
    showPage('dashboard');
    updateNotifDot();
  } else {
    const e=document.getElementById('l-err');
    e.style.display='block';
    setTimeout(()=>e.style.display='none',3000);
  }
}

}

function setPreset(k,el){
  document.querySelectorAll('.dfb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const p=PRESETS[k];
  ST.fs=p.s; ST.fe=p.e;
  document.getElementById('df-from').value=IDX2DATE[p.s];
  document.getElementById('df-to').value=IDX2DATE[p.e];
  document.getElementById('df-tag-txt').textContent=p.label;
  refreshPage();
}
function applyRange(){
  document.querySelectorAll('.dfb').forEach(b=>b.classList.remove('active'));
  const f=document.getElementById('df-from').value;
  const t=document.getElementById('df-to').value;
  const si=DATE2IDX[f.slice(0,7)], ei=DATE2IDX[t.slice(0,7)];
  if(si==null||ei==null||si>ei){ toast('Intervalo de datas inválido','err'); return; }
  ST.fs=si; ST.fe=ei;
  const mn=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const fl=d=>{ const[y,m]=d.split('-'); return mn[+m-1]+' '+y; };
  document.getElementById('df-tag-txt').textContent=fl(f)+' — '+fl(t);
  refreshPage();
}
function refreshPage(){
  destroyCharts();
  if(ST.page==='dashboard')    { renderContent(rDashboard); setTimeout(rDashCharts,50); }
  else if(ST.page==='company') { renderContent(()=>rCompany(ST.co)); setTimeout(()=>rCoCharts(ST.co,ST.tab),50); }

function rContasRows(coF='',stF='',q=''){
  const rows=DB.lancamentos.filter(l=>l.tipo==='despesa')
    .filter(l=>!coF||l.coId===coF)
    .filter(l=>!stF||l.status===stF)
    .filter(l=>!q||l.desc.toLowerCase().includes(q.toLowerCase()));
  if(!rows.length) return `<tr><td colspan="6" class="t-empty">Nenhum lançamento encontrado</td></tr>`;
  return rows.map(l=>`<tr>
    <td><span class="b b-${l.coId}">${co(l.coId)?.name||l.coId}</span></td>
    <td>${l.desc}</td><td style="color:var(--muted)">${l.cat}</td>
    <td>${fmt(l.val)}</td><td style="color:var(--muted)">${fmtD(l.venc)}</td>
    <td><span class="b b-${l.status}">${l.status.charAt(0).toUpperCase()+l.status.slice(1)}</span></td>
  </tr>`).join('');
}
function rContasSummary(coF=''){
  const d=DB.lancamentos.filter(l=>l.tipo==='despesa'&&(!coF||l.coId===coF));
  const pend=d.filter(l=>l.status==='pendente').reduce((a,l)=>a+l.val,0);
  const venc=d.filter(l=>l.status==='vencido').reduce((a,l)=>a+l.val,0);
  const pago=d.filter(l=>l.status==='pago').reduce((a,l)=>a+l.val,0);
  return `<div class="t-sum"><span style="color:var(--amber)">Pendente: <span>${fmt(pend)}</span></span><span style="color:var(--red)">Vencido: <span>${fmt(venc)}</span></span><span style="color:var(--green)">Pago: <span>${fmt(pago)}</span></span></div>`;
}
function filterDashTable(){

function applyLancFilter(){

  const q=document.getElementById('lf-q')?.value?.toLowerCase()||'';
  const rows=DB.lancamentos.filter(l=>l.tipo==='despesa')
    .filter(l=>!coF||l.coId===coF)
    .filter(l=>!stF||l.status===stF)

  const tb=document.getElementById('lanc-tbody');
  if(tb) tb.innerHTML=rows.length?rows.map(l=>`<tr>
    <td><span class="b b-${l.coId}">${co(l.coId)?.name}</span></td>

      <button class="ib" onclick="delLanc(${l.id})"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h10M5 4V2h4v2M5.5 7v4M8.5 7v4M3 4l.7 8h6.6L11 4"/></svg></button>

function calcTax(){
  const coSel=document.getElementById('nf-co')?.value;
  const c=co(coSel); if(!c) return;
  const bruto=parseFloat(document.getElementById('nf-bruto')?.value||0);
  if(!bruto){ document.getElementById('nf-tax').style.display='none'; return; }
  const imp=bruto*(c.aliq/100); const liq=bruto-imp;
  document.getElementById('nf-imp').value=fmt(imp);
  document.getElementById('nf-liq').value=fmt(liq);
  document.getElementById('nf-tax').style.display='flex';
  document.getElementById('nf-t-b').textContent=fmt(bruto);
  document.getElementById('nf-t-a').textContent=c.aliq+'%';
  document.getElementById('nf-t-i').textContent=fmt(imp);
  document.getElementById('nf-t-l').textContent=fmt(liq);
}

function rDRE(){
  const labels=getLabels();
  const gFat=[340,355,368,381,395,406,348,379,405,425,455,487].map(v=>v*1000);
  const gDesp=[158,163,168,172,176,180,183,190,198,203,210,218].map(v=>v*1000);
  const gImp=gFat.map(v=>Math.round(v*0.125));
  const rows=labels.map((_,i)=>{
    const fi=ST.fs+i; const f=gFat[fi],d=gDesp[fi],imp=gImp[fi],res=f-imp-d;
    return `<tr><td>${ML[fi]}</td><td>${fmt(f)}</td><td style="color:var(--red)">${fmt(imp)}</td><td>${fmt(f-imp)}</td><td style="color:var(--red)">${fmt(d)}</td><td style="color:${res>=0?'var(--green)':'var(--red)'}"><strong>${fmt(res)}</strong></td></tr>`;
  }).join('');
  const totF=labels.reduce((_,__,i)=>_+gFat[ST.fs+i],0);
  const totD=labels.reduce((_,__,i)=>_+gDesp[ST.fs+i],0);
  const totI=labels.reduce((_,__,i)=>_+gImp[ST.fs+i],0);
  const totR=totF-totI-totD;
  return `<div style="display:flex;gap:8px;margin-bottom:14px"><button class="bg-btn bsm" onclick="toast('Exportando PDF...','info')">Exportar PDF</button><button class="bg-btn bsm" onclick="toast('Exportando Excel...','info')">Exportar Excel</button></div>

  <tbody>${rows}<tr style="background:rgba(255,255,255,.03);font-weight:500">
    <td>TOTAL</td><td>${fmt(totF)}</td><td style="color:var(--red)">${fmt(totI)}</td><td>${fmt(totF-totI)}</td><td style="color:var(--red)">${fmt(totD)}</td>

  </tr></tbody></table></div>`;
}

function rRH(){
  return `<div class="pg-hdr"><div class="pg-title">Pessoas & RH</div><div class="pg-sub">Gestão de colaboradores de todo o grupo</div></div>
  <div class="tabs" id="rht">
    <button class="tab active" onclick="switchRHTab(0,this)">Colaboradores</button>
    <button class="tab" onclick="switchRHTab(1,this)">Folha de Pagamento</button>
    <button class="tab" onclick="switchRHTab(2,this)">Admissão</button>
    <button class="tab" onclick="switchRHTab(3,this)">Férias & Afastamentos</button>
  </div>
  <div id="tab-body">${rColaboradores()}</div>`;
}
function switchRHTab(idx,el){
  document.querySelectorAll('#rht .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-body').innerHTML=[rColaboradores,rFolha,rAdmissao,rFerias][idx]();
}
function rColaboradores(coFil=''){
  const funcs=DB.funcionarios.filter(f=>!coFil||f.coId===coFil);
  const tot=funcs.reduce((a,f)=>a+f.sal,0);
  return `<div class="kg kg-4" style="margin-bottom:14px">
    <div class="kc"><div class="kc-lbl">Total Colaboradores</div><div class="kc-val">${funcs.length}</div><div class="kc-d db">Ativos no grupo</div></div>
    <div class="kc"><div class="kc-lbl">Folha Mensal Total</div><div class="kc-val">${fmt(tot)}</div><div class="kc-d dw">Bruto total</div></div>
    <div class="kc"><div class="kc-lbl">Em Férias</div><div class="kc-val">${funcs.filter(f=>f.status==='ferias').length}</div><div class="kc-d db">Atualmente</div></div>
    <div class="kc"><div class="kc-lbl">Tipo CLT</div><div class="kc-val">${funcs.filter(f=>f.tipo==='CLT').length}</div><div class="kc-d du">Contratados</div></div>
  </div>
  <div class="tc"><div class="tc-hdr"><span class="tc-title">Colaboradores</span>
    <div class="tc-f">
      <select class="fs" onchange="document.getElementById('tab-body').innerHTML=rColaboradores(this.value)">
        <option value="">Todas empresas</option>${DB.companies.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
      </select>
      <select class="fs"><option value="">Todos status</option><option>ativo</option><option>ferias</option></select>
      <button class="bp bsm" onclick="switchRHTab(2,document.querySelectorAll('#rht .tab')[2])">+ Admitir</button>
    </div>
  </div>
  <table><thead><tr><th>Nome</th><th>Empresa</th><th>Cargo</th><th>Departamento</th><th>Tipo</th><th>Salário</th><th>Admissão</th><th>Status</th><th>Ações</th></tr></thead>
  <tbody>${funcs.map(f=>`<tr>
    <td>${f.nome}</td>
    <td><span class="b b-${f.coId}">${co(f.coId)?.name}</span></td>
    <td style="color:var(--muted)">${f.cargo}</td>
    <td style="color:var(--muted)">${f.dept}</td>
    <td><span class="b b-${f.tipo==='CLT'?'ativo':'financeiro'}">${f.tipo}</span></td>
    <td>${fmt(f.sal)}</td>
    <td style="color:var(--muted)">${fmtD(f.adm)}</td>
    <td><span class="b b-${f.status}">${f.status.charAt(0).toUpperCase()+f.status.slice(1)}</span></td>
    <td>
      <button class="ib" onclick="modalEditFunc(${f.id})" title="Editar"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z"/></svg></button>
      <button class="ib" onclick="modalVerFunc(${f.id})" title="Perfil"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="5" r="3"/><path d="M1 13c0-3 2.7-5 6-5s6 2 6 5"/></svg></button>
    </td>
  </tr>`).join('')}</tbody></table>
  <div class="t-sum"><span>Folha Total: <span>${fmt(tot)}</span></span><span>CLT: <span>${funcs.filter(f=>f.tipo==='CLT').length}</span></span><span>PJ: <span>${funcs.filter(f=>f.tipo==='PJ').length}</span></span></div></div>`;
}
function modalEditFunc(id){
  const f=DB.funcionarios.find(x=>x.id===id); if(!f) return;
  showModal(`<div class="modal modal-lg"><div class="mhdr"><span class="mtitle">Editar Colaborador</span><button class="mclose" onclick="closeModal()">×</button></div>
    <div class="fg fg-2">
      <div class="fgrp"><div class="flbl">Nome</div><input class="finp" id="ef-nome" value="${f.nome}"></div>
      <div class="fgrp"><div class="flbl">Empresa</div><select class="fsel" id="ef-co">${DB.companies.map(c=>`<option value="${c.id}" ${c.id===f.coId?'selected':''}>${c.name}</option>`).join('')}</select></div>
      <div class="fgrp"><div class="flbl">Cargo</div><input class="finp" id="ef-cargo" value="${f.cargo}"></div>
      <div class="fgrp"><div class="flbl">Departamento</div><input class="finp" id="ef-dept" value="${f.dept}"></div>
      <div class="fgrp"><div class="flbl">Tipo Contrato</div><select class="fsel" id="ef-tipo"><option ${f.tipo==='CLT'?'selected':''}>CLT</option><option ${f.tipo==='PJ'?'selected':''}>PJ</option><option>Estágio</option></select></div>
      <div class="fgrp"><div class="flbl">Salário (R$)</div><input class="finp" type="number" id="ef-sal" value="${f.sal}"></div>
      <div class="fgrp"><div class="flbl">E-mail</div><input class="finp" id="ef-email" value="${f.email}"></div>
      <div class="fgrp"><div class="flbl">Status</div><select class="fsel" id="ef-st"><option value="ativo" ${f.status==='ativo'?'selected':''}>Ativo</option><option value="ferias" ${f.status==='ferias'?'selected':''}>Férias</option><option value="afastado">Afastado</option><option value="demitido">Demitido</option></select></div>
    </div>
    <div class="fa" style="margin-top:0;padding-top:12px">
      <button class="bp" onclick="saveEditFunc(${id})">Salvar</button>
      <button class="bg-btn" onclick="closeModal()">Cancelar</button>
    </div></div>`);
}
function saveEditFunc(id){
  const f=DB.funcionarios.find(x=>x.id===id); if(!f) return;
  f.nome=document.getElementById('ef-nome').value;
  f.coId=document.getElementById('ef-co').value;
  f.cargo=document.getElementById('ef-cargo').value;
  f.dept=document.getElementById('ef-dept').value;
  f.tipo=document.getElementById('ef-tipo').value;
  f.sal=parseFloat(document.getElementById('ef-sal').value)||f.sal;
  f.email=document.getElementById('ef-email').value;
  f.status=document.getElementById('ef-st').value;
  closeModal(); toast('Colaborador atualizado!'); renderContent(rRH);
}
function modalVerFunc(id){
  const f=DB.funcionarios.find(x=>x.id===id); if(!f) return;
  const inss=Math.round(f.sal*0.11); const irrf=f.sal>4664?Math.round((f.sal-4664)*0.15):0;
  showModal(`<div class="modal"><div class="mhdr"><span class="mtitle">Perfil — ${f.nome}</span><button class="mclose" onclick="closeModal()">×</button></div>
    <div class="kg kg-2" style="margin-bottom:14px">
      <div class="kc"><div class="kc-lbl">Cargo</div><div style="font-size:13px;font-weight:500;margin-top:4px">${f.cargo}</div></div>
      <div class="kc"><div class="kc-lbl">Empresa</div><div style="margin-top:4px"><span class="b b-${f.coId}">${co(f.coId)?.name}</span></div></div>
    </div>
    <div class="sec-title">Dados Pessoais</div>
    <div class="stat-row"><span class="stat-l">CPF</span><span class="stat-v">${f.cpf}</span></div>
    <div class="stat-row"><span class="stat-l">PIS/PASEP</span><span class="stat-v">${f.pis}</span></div>
    <div class="stat-row"><span class="stat-l">E-mail</span><span class="stat-v">${f.email}</span></div>
    <div class="stat-row"><span class="stat-l">Tipo Contrato</span><span class="stat-v">${f.tipo}</span></div>
    <div class="stat-row"><span class="stat-l">Data Admissão</span><span class="stat-v">${fmtD(f.adm)}</span></div>
    <div class="sec-title" style="margin-top:14px">Remuneração</div>
    <div class="stat-row"><span class="stat-l">Salário Bruto</span><span class="stat-v">${fmt(f.sal)}</span></div>
    <div class="stat-row"><span class="stat-l">INSS (11%)</span><span class="stat-v" style="color:var(--red)">- ${fmt(inss)}</span></div>
    <div class="stat-row"><span class="stat-l">IRRF</span><span class="stat-v" style="color:var(--red)">- ${fmt(irrf)}</span></div>
    <div class="stat-row"><span class="stat-l">Salário Líquido</span><span class="stat-v" style="color:var(--green)">${fmt(f.sal-inss-irrf)}</span></div>
    <div class="fa" style="margin-top:0;padding-top:12px"><button class="bg-btn" onclick="closeModal()">Fechar</button></div>
  </div>`);
}
function rFolha(){
  const funcs=DB.funcionarios;
  const tot=funcs.reduce((a,f)=>a+f.sal,0);
  const totINSS=funcs.reduce((a,f)=>a+Math.round(f.sal*0.11),0);
  const totLiq=funcs.reduce((a,f)=>a+(f.sal-Math.round(f.sal*0.11)-(f.sal>4664?Math.round((f.sal-4664)*0.15):0)),0);
  return `<div class="fb" style="margin-bottom:14px">
    <div style="font-size:13px;font-weight:500">Folha de Pagamento — Março/2026</div>
    <div class="flex g8"><button class="bg-btn bsm" onclick="toast('Exportando holerites...','info')">Exportar Holerites</button><button class="bp bsm" onclick="toast('Folha processada! Integre com eSocial.','ok')">Processar Folha</button></div>
  </div>
  <div class="tc"><div class="tc-hdr"><span class="tc-title">Folha Consolidada</span></div>
  <table><thead><tr><th>Colaborador</th><th>Empresa</th><th>Cargo</th><th>Tipo</th><th>Salário Bruto</th><th>INSS (11%)</th><th>IRRF</th><th>Salário Líquido</th><th>Status</th></tr></thead>
  <tbody>${funcs.map(f=>{
    const inss=Math.round(f.sal*0.11); const irrf=f.sal>4664?Math.round((f.sal-4664)*0.15):0;
    return `<tr>
      <td>${f.nome}</td>
      <td><span class="b b-${f.coId}">${co(f.coId)?.name}</span></td>
      <td style="color:var(--muted)">${f.cargo}</td>
      <td><span class="b b-${f.tipo==='CLT'?'ativo':'financeiro'}">${f.tipo}</span></td>
      <td>${fmt(f.sal)}</td>
      <td style="color:var(--red)">${fmt(inss)}</td>
      <td style="color:var(--red)">${fmt(irrf)}</td>
      <td style="color:var(--green)"><strong>${fmt(f.sal-inss-irrf)}</strong></td>
      <td><span class="b b-pendente">Pendente</span></td>
    </tr>`;
  }).join('')}</tbody></table>
  <div class="t-sum"><span>Total Bruto: <span>${fmt(tot)}</span></span><span>Total INSS: <span style="color:var(--red)">${fmt(totINSS)}</span></span><span>Total Líquido: <span style="color:var(--green)">${fmt(totLiq)}</span></span></div></div>`;
}

  <div class="fg fg-2">
    <div class="fgrp"><div class="flbl">Empresa *</div><select class="fsel" id="na-co">${DB.companies.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
    <div class="fgrp"><div class="flbl">Nome Completo *</div><input class="finp" id="na-nome" placeholder="Nome do colaborador"></div>
    <div class="fgrp"><div class="flbl">CPF *</div><input class="finp" id="na-cpf" placeholder="000.000.000-00"></div>
    <div class="fgrp"><div class="flbl">E-mail Corporativo</div><input class="finp" id="na-email" type="email" placeholder="nome@empresa.com.br"></div>
    <div class="fgrp"><div class="flbl">Cargo *</div><input class="finp" id="na-cargo" placeholder="Ex: Desenvolvedor Sênior"></div>
    <div class="fgrp"><div class="flbl">Departamento</div><select class="fsel" id="na-dept"><option>Tecnologia</option><option>Marketing</option><option>Comercial</option><option>Operacional</option><option>Financeiro</option><option>RH</option><option>Diretoria</option></select></div>
    <div class="fgrp"><div class="flbl">Tipo Contrato *</div><select class="fsel" id="na-tipo"><option>CLT</option><option>PJ</option><option>Estágio</option><option>Temporário</option></select></div>
    <div class="fgrp"><div class="flbl">Salário / Remuneração (R$) *</div><input class="finp" type="number" id="na-sal" placeholder="0,00"></div>
    <div class="fgrp"><div class="flbl">Data de Admissão *</div><input class="finp" type="date" id="na-adm"></div>
    <div class="fgrp"><div class="flbl">Jornada</div><select class="fsel" id="na-jornada"><option>44h semanais</option><option>40h semanais</option><option>36h semanais</option><option>20h semanais</option></select></div>
    <div class="fgrp"><div class="flbl">Banco</div><input class="finp" id="na-banco" placeholder="Ex: Nubank"></div>
    <div class="fgrp"><div class="flbl">Agência / Conta</div><input class="finp" id="na-conta" placeholder="0001 / 12345-6"></div>
    <div class="fgrp"><div class="flbl">PIS/PASEP</div><input class="finp" id="na-pis" placeholder="000.00000.00-0"></div>
    <div class="fgrp"><div class="flbl">CTPS</div><input class="finp" id="na-ctps" placeholder="00000/001-SC"></div>
    <div class="fgrp" style="grid-column:span 2"><div class="flbl">Endereço</div><input class="finp" id="na-end" placeholder="Rua, número, bairro, cidade/UF"></div>
  </div>
  <div class="sec-title">Documentos</div>
  <div class="upg upg-3">
    <div class="upb" onclick="toast('Upload RG/CNH','info')"><div class="upb-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg></div><div class="upb-lbl">RG / CNH</div><div class="upb-sub">PDF, JPG</div></div>
    <div class="upb" onclick="toast('Upload CTPS Digital','info')"><div class="upb-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg></div><div class="upb-lbl">CTPS Digital</div><div class="upb-sub">PDF</div></div>
    <div class="upb" onclick="toast('Upload Contrato Assinado','info')"><div class="upb-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg></div><div class="upb-lbl">Contrato Assinado</div><div class="upb-sub">PDF</div></div>
  </div>
  <div class="fa"><button class="bp" onclick="saveAdmissao()">Registrar Admissão</button><button class="bg-btn" onclick="switchRHTab(0,document.querySelectorAll('#rht .tab')[0])">Cancelar</button></div></div>`;

function saveAdmissao(){
  const nome=document.getElementById('na-nome')?.value?.trim();
  const sal=parseFloat(document.getElementById('na-sal')?.value||0);
  const adm=document.getElementById('na-adm')?.value;
  const cargo=document.getElementById('na-cargo')?.value?.trim();
  if(!nome||!sal||!adm||!cargo){ toast('Preencha os campos obrigatórios (*)','err'); return; }
  const cpf=document.getElementById('na-cpf')?.value||'';
  DB.funcionarios.push({id:++DB.nextId,
    coId:document.getElementById('na-co').value,nome,cargo,
    dept:document.getElementById('na-dept').value,
    sal,tipo:document.getElementById('na-tipo').value,adm,status:'ativo',
    email:document.getElementById('na-email')?.value||'',
    cpf,pis:document.getElementById('na-pis')?.value||''});
  toast('Colaborador admitido com sucesso!'); renderContent(rRH);
}
function rFerias(){
  return `<div class="fb" style="margin-bottom:14px">
    <div style="font-size:12px;color:var(--muted)">Controle de férias e afastamentos</div>
    <button class="bp bsm" onclick="modalAddFerias()">+ Solicitar Férias</button>
  </div>
  <div class="tc"><div class="tc-hdr"><span class="tc-title">Histórico de Férias e Afastamentos</span></div>
  <table><thead><tr><th>Colaborador</th><th>Empresa</th><th>Tipo</th><th>Início</th><th>Retorno</th><th>Dias</th><th>Status</th><th>Ações</th></tr></thead>
  <tbody>${DB.ferias.map(f=>`<tr>
    <td>${f.nome}</td>
    <td><span class="b b-${f.coId}">${co(f.coId)?.name}</span></td>
    <td>${f.tipo}</td>
    <td style="color:var(--muted)">${fmtD(f.inicio)}</td>
    <td style="color:var(--muted)">${fmtD(f.retorno)}</td>
    <td>${f.dias} dias</td>
    <td><span class="b b-${f.status==='ativo'?'ferias':f.status}">${f.status.charAt(0).toUpperCase()+f.status.slice(1)}</span></td>
    <td><button class="ib" onclick="delFerias(${f.id})"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h10M5 4V2h4v2M5.5 7v4M8.5 7v4M3 4l.7 8h6.6L11 4"/></svg></button></td>
  </tr>`).join('')||`<tr><td colspan="8" class="t-empty">Nenhum registro</td></tr>`}</tbody></table></div>`;
}
function modalAddFerias(){
  showModal(`<div class="modal"><div class="mhdr"><span class="mtitle">Solicitar Férias / Afastamento</span><button class="mclose" onclick="closeModal()">×</button></div>
    <div class="fg fg-2">
      <div class="fgrp"><div class="flbl">Colaborador</div><select class="fsel" id="af-func">${DB.funcionarios.map(f=>`<option value="${f.id}">${f.nome}</option>`).join('')}</select></div>
      <div class="fgrp"><div class="flbl">Tipo</div><select class="fsel" id="af-tipo"><option>Férias</option><option>Licença Médica</option><option>Licença Maternidade</option><option>Licença Paternidade</option><option>Afastamento INSS</option></select></div>
      <div class="fgrp"><div class="flbl">Data Início</div><input class="finp" type="date" id="af-ini"></div>
      <div class="fgrp"><div class="flbl">Data Retorno</div><input class="finp" type="date" id="af-ret"></div>
    </div>
    <div class="fa" style="margin-top:0;padding-top:12px">
      <button class="bp" onclick="saveFerias()">Registrar</button>
      <button class="bg-btn" onclick="closeModal()">Cancelar</button>
    </div></div>`);
}
function saveFerias(){
  const funcId=parseInt(document.getElementById('af-func')?.value);
  const f=DB.funcionarios.find(x=>x.id===funcId);
  const ini=document.getElementById('af-ini')?.value;
  const ret=document.getElementById('af-ret')?.value;
  if(!ini||!ret){ toast('Preencha as datas','err'); return; }
  const dias=Math.round((new Date(ret)-new Date(ini))/(1000*60*60*24));
  DB.ferias.push({id:++DB.nextId,funcId,coId:f?.coId||'',nome:f?.nome||'',
    tipo:document.getElementById('af-tipo').value,inicio:ini,retorno:ret,dias,status:'aprovado'});
  if(f) f.status='ferias';
  closeModal(); toast('Férias registradas!'); renderContent(rRH);
}
function delFerias(id){
  if(!confirm('Remover este registro?')) return;
  const fv=DB.ferias.find(f=>f.id===id);
  if(fv){ const func=DB.funcionarios.find(f=>f.id===fv.funcId); if(func) func.status='ativo'; }
  DB.ferias=DB.ferias.filter(f=>f.id!==id);
  toast('Registro removido'); renderContent(rRH);
}

// NOTIFICAÇÕES
// ═══════════════════════════════════════════════════════
function rNotificacoes(){
  const unread=DB.notificacoes.filter(n=>!n.lida).length;
  return `<div class="pg-hdr"><div class="pg-title">Notificações</div><div class="pg-sub">${unread} não lida(s)</div></div>
  <div class="flex g8" style="margin-bottom:16px">
    <button class="bp bsm" onclick="marcarTodasLidas()">Marcar todas como lidas</button>
    <button class="bg-btn bsm" onclick="renderContent(()=>rNotifFiltradas('nao-lidas'))">Apenas não lidas</button>
    <button class="bg-btn bsm" onclick="renderContent(rNotificacoes)">Todas</button>
  </div>
  <div class="cc" id="notif-lista">
    ${rNotifItens(DB.notificacoes)}
  </div>`;
}
function rNotifFiltradas(tipo){
  const itens=tipo==='nao-lidas'?DB.notificacoes.filter(n=>!n.lida):DB.notificacoes;
  document.getElementById('notif-lista').innerHTML=rNotifItens(itens);
}
function rNotifItens(itens){
  if(!itens.length) return `<div class="t-empty">Nenhuma notificação</div>`;
  return itens.map(n=>`
  <div class="notif-item ${!n.lida?'notif-unread':''}">
    <div class="notif-icon" style="background:${n.color}22;color:${n.color};font-size:14px">${n.icon}</div>
    <div class="notif-content">
      <div class="notif-msg" style="${!n.lida?'font-weight:600':''}">${n.msg}</div>
      <div class="notif-sub">${n.sub}</div>
      ${n.coId?`<span class="b b-${n.coId}" style="margin-top:4px">${co(n.coId)?.name||''}</span>`:''}
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
      <span class="notif-time">${fmtD(n.data)}</span>
      ${!n.lida?`<span class="b b-pendente">Nova</span>`:''}

function addEmpresa(){

  if(!aliq&&aliq!==0){ toast('Preencha a alíquota','err'); return; }
  const id=nome.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'').slice(0,20);
  const newCo={id,name:nome,cnpj,ie:document.getElementById('ne-ie')?.value||'',im:document.getElementById('ne-im')?.value||'',
    regime:document.getElementById('ne-regime')?.value||'Simples Nacional',aliq,
    cnae:document.getElementById('ne-cnae')?.value||'',

    tel:document.getElementById('ne-tel')?.value||'',end:document.getElementById('ne-end')?.value||'',
    fundacao:document.getElementById('ne-fund')?.value||'',
    banco_principal:document.getElementById('ne-banco')?.value||'',

    caixa_emg:0,caixa_emg_meta:0,caixa_inv:0,caixa_div:0,div_data:'',
  };
  DB.companies.push(newCo);
  DB.bancos[id]=[];
  DB.orcamento[id]={Marketing:0,Tecnologia:0,Infraestrutura:0,'Folha de Pagamento':0,Administrativo:0};
  closeModal(); buildSidebar(); toast(`Empresa "${nome}" criada!`,'ok'); renderContent(rConfigGrupo);

function saveEditEmpresa(coId){
  const c=co(coId); if(!c) return;
  c.name=document.getElementById('ee-nome').value;
  c.cnpj=document.getElementById('ee-cnpj').value;
  c.ie=document.getElementById('ee-ie').value;
  c.im=document.getElementById('ee-im').value;
  c.regime=document.getElementById('ee-regime').value;
  c.aliq=parseFloat(document.getElementById('ee-aliq').value)||c.aliq;
  c.email=document.getElementById('ee-email').value;
  c.tel=document.getElementById('ee-tel').value;
  c.resp=document.getElementById('ee-resp').value;
  c.color=document.getElementById('ee-color').value;
  c.end=document.getElementById('ee-end').value;

  <div class="max-w">
    <div class="fg fg-2">

    </div>
    <div class="sec-title">Segurança</div>
    <div class="fg fg-3">
      <div class="fgrp"><div class="flbl">Senha Atual</div><input class="finp" type="password" id="pf-old" placeholder="••••••••"></div>
      <div class="fgrp"><div class="flbl">Nova Senha</div><input class="finp" type="password" id="pf-new" placeholder="••••••••"></div>
      <div class="fgrp"><div class="flbl">Confirmar</div><input class="finp" type="password" id="pf-cfm" placeholder="••••••••"></div>
    </div>
    <div class="fa">
      <button class="bp" onclick="salvarPerfil()">Salvar Perfil</button>
      <button class="bg-btn" onclick="toast('Alterações descartadas')">Cancelar</button>
    </div>

function salvarPerfil(){
  const n=document.getElementById('pf-new')?.value;
  const c=document.getElementById('pf-cfm')?.value;
  if(n&&n!==c){ toast('As senhas não coincidem','err'); return; }
  if(n&&n.length<8){ toast('Senha mínima de 8 caracteres','err'); return; }
  if(n){ USERS_DB[CU.username].pass=n; }
  CU.name=document.getElementById('pf-nome')?.value||CU.name;
  buildSidebar(); toast('Perfil atualizado com sucesso!','ok');
}

function rCompany(coId){
  const c=co(coId); if(!c) return '<div class="t-empty">Empresa não encontrada</div>';
  const tabs=['Dashboard','Controle Bancário','Lançar Despesa','Lançar Faturamento','Contas a Pagar','Faturamentos','Relatórios','Pessoas & RH','Configurações'];
  ST.tab=ST.tab||0;
  return `
  <div class="pg-hdr">
    <div class="pg-title">
      ${c.name}
      ${c.holding?'<span class="pg-badge badge-holding">⬡ HOLDING</span>':'<span class="pg-badge badge-empresa">Empresa</span>'}
    </div>
    <div class="pg-sub">${c.cnpj} · ${c.regime} · Alíquota ${c.aliq}%</div>
  </div>
  <div class="tabs" id="co-tabs">
    ${tabs.map((t,i)=>`<button class="tab ${i===ST.tab?'active':''}" onclick="switchCoTab('${coId}',${i},this)">${t}</button>`).join('')}
  </div>
  <div id="co-tab-body">${rCoTab(coId,ST.tab)}</div>`;
}
function switchCoTab(coId,idx,el){
  ST.tab=idx;
  document.querySelectorAll('#co-tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const c=co(coId);
  const tabNames=['Dashboard','Controle Bancário','Lançar Despesa','Lançar Faturamento','Contas a Pagar','Faturamentos','Relatórios','Pessoas & RH','Configurações'];
  setBc(c?.name||coId, tabNames[idx]||'');
  const hideDf=[2,3,8].includes(idx);
  showDf(!hideDf);
  destroyCharts();
  document.getElementById('co-tab-body').innerHTML=rCoTab(coId,idx);
  if(idx===0) setTimeout(()=>rCoCharts(coId,0),50);
  if(idx===1) setTimeout(()=>rCoCharts(coId,1),50);
  if(idx===6) setTimeout(()=>rCoCharts(coId,6),50);
}
function rCoTab(coId,idx){
  const fns=[
    ()=>rCoDashboard(coId),
    ()=>rCoBancario(coId),
    ()=>rFormDespesa(coId),
    ()=>rFormFaturamento(coId),
    ()=>rCoContas(coId),
    ()=>rCoFaturamentos(coId),
    ()=>rCoRelatorios(coId),
    ()=>rCoRH(coId),
    ()=>rCoConfig(coId),
  ];
  return (fns[idx]||fns[0])();
}

// ── Dashboard da empresa ──────────────────────────────
function rCoDashboard(coId){
  const c=co(coId); const ci=ST.fe;
  const imp=Math.round(c.fat[ci]*(c.aliq/100));
  const liq=c.fat[ci]-imp-c.desp[ci];
  const funcs=DB.funcionarios.filter(f=>f.coId===coId);
  const folha=funcs.reduce((a,f)=>a+f.sal,0);
  const lancs=DB.lancamentos.filter(l=>l.coId===coId);
  const pend=lancs.filter(l=>l.tipo==='despesa'&&l.status==='pendente').reduce((a,l)=>a+l.val,0);
  const venc=lancs.filter(l=>l.tipo==='despesa'&&l.status==='vencido').reduce((a,l)=>a+l.val,0);
  const contas=DB.bancos[coId]||[];
  const saldoBancos=contas.filter(b=>b.ativa).reduce((a,b)=>a+b.saldo,0);
  const notifCo=DB.notificacoes.filter(n=>n.coId===coId&&!n.lida);

  return `
  ${venc>0?`<div class="notice notice-red"><strong>Atenção:</strong> ${fmt(venc)} em conta(s) vencida(s). <span style="cursor:pointer;text-decoration:underline;color:var(--red)" onclick="switchCoTab('${coId}',4,document.querySelectorAll('#co-tabs .tab')[4])">Ver contas a pagar →</span></div>`:''}
  ${notifCo.length>0?`<div class="notice notice-blue"><strong>${notifCo.length} notificação(ões)</strong> não lida(s) para esta empresa. <span style="cursor:pointer;text-decoration:underline;color:var(--blue)" onclick="showPage('notificacoes')">Ver →</span></div>`:''}

  <div class="kg kg-5">
    <div class="kc"><div class="kc-lbl">Faturamento</div><div class="kc-val acc">${fmtK(c.fat[ci])}</div><div class="kc-d du">▲ +12% vs mês ant.</div></div>
    <div class="kc"><div class="kc-lbl">Despesas</div><div class="kc-val">${fmtK(c.desp[ci])}</div><div class="kc-d dd">▲ +6%</div></div>
    <div class="kc"><div class="kc-lbl">Imposto (${c.aliq}%)</div><div class="kc-val neg">${fmtK(imp)}</div><div class="kc-d dw">Vence em 20 dias</div></div>
    <div class="kc"><div class="kc-lbl">Resultado Líquido</div><div class="kc-val ${liq>=0?'pos':'neg'}">${fmtK(liq)}</div><div class="kc-d ${liq>=0?'du':'dd'}">▲ +18%</div></div>
    <div class="kc"><div class="kc-lbl">Saldo Bancário</div><div class="kc-val acc">${fmtK(saldoBancos)}</div><div class="kc-d db">${contas.filter(b=>b.ativa).length} conta(s)</div></div>
  </div>
  <div class="kg kg-3">
    <div class="kc"><div class="kc-lbl">Colaboradores</div><div class="kc-val">${funcs.length}</div><div class="kc-d db">Ativos</div></div>
    <div class="kc"><div class="kc-lbl">Folha Mensal</div><div class="kc-val">${fmtK(folha)}</div><div class="kc-d dw">${c.fat[ci]>0?Math.round(folha/c.fat[ci]*100):0}% do faturamento</div></div>
    <div class="kc"><div class="kc-lbl">Contas Pendentes</div><div class="kc-val ${pend>0?'neg':''}">${pend>0?fmtK(pend):'—'}</div><div class="kc-d ${pend>0?'dw':'du'}">${pend>0?'Aguardando':'Em dia'}</div></div>
  </div>
  <div class="cg cg-2">
    <div class="cc"><div class="cc-hdr"><div><div class="cc-title">Faturamento vs Despesas</div><div class="cc-sub">${ML[ST.fs]} — ${ML[ST.fe]}</div></div></div><div class="cw"><canvas id="ch-co-fat"></canvas></div></div>
    <div class="cc"><div class="cc-hdr"><div><div class="cc-title">Resultado Mensal</div></div></div><div class="cw"><canvas id="ch-co-res"></canvas></div></div>
  </div>
  <div class="tc">
    <div class="tc-hdr"><span class="tc-title">Últimos Lançamentos</span>
      <button class="bp bsm" onclick="switchCoTab('${coId}',4,document.querySelectorAll('#co-tabs .tab')[4])">Ver todos →</button>
    </div>
    <table><thead><tr><th>Tipo</th><th>Descrição</th><th>Valor</th><th>Data</th><th>Status</th></tr></thead>
    <tbody>${lancs.slice(0,5).map(l=>`<tr>
      <td><span class="b b-${l.tipo==='despesa'?'despesa':'receita'}">${l.tipo==='despesa'?'Despesa':'Receita'}</span></td>
      <td>${l.desc}</td><td>${fmt(l.val)}</td>
      <td style="color:var(--muted)">${fmtD(l.venc||l.data)}</td>
      <td><span class="b b-${l.status}">${l.status.charAt(0).toUpperCase()+l.status.slice(1)}</span></td>
    </tr>`).join('')||`<tr><td colspan="5" class="t-empty">Nenhum lançamento</td></tr>`}</tbody></table>
  </div>`;
}

// CONTROLE BANCÁRIO — MÓDULO PRINCIPAL

function rCoBancario(coId){
  const contas=(DB.bancos[coId]||[]);
  const ativas=contas.filter(b=>b.ativa);
  const saldoTotal=ativas.reduce((a,b)=>a+b.saldo,0);
  const txAll=DB.transacoes.filter(t=>t.coId===coId);
  const rec=txAll.filter(t=>t.tipo==='receita').reduce((a,t)=>a+t.val,0);
  const desp=txAll.filter(t=>t.tipo==='despesa').reduce((a,t)=>a+t.val,0);
  const nConc=txAll.filter(t=>!t.conciliado).length;

  return `
  ${nConc>0?`<div class="notice notice-blue"><strong>${nConc} transação(ões)</strong> aguardando conciliação manual. <span style="cursor:pointer;text-decoration:underline;color:var(--blue)" onclick="showConciliacao('${coId}')">Conciliar →</span></div>`:''}

  <div class="kg kg-4" style="margin-bottom:18px">
    <div class="kc"><div class="kc-lbl">Saldo Total</div><div class="kc-val acc">${fmt(saldoTotal)}</div><div class="kc-d db">${ativas.length} conta(s) ativa(s)</div></div>
    <div class="kc"><div class="kc-lbl">Entradas (período)</div><div class="kc-val pos">${fmt(rec)}</div><div class="kc-d du">Receitas registradas</div></div>
    <div class="kc"><div class="kc-lbl">Saídas (período)</div><div class="kc-val neg">${fmt(desp)}</div><div class="kc-d dd">Despesas registradas</div></div>
    <div class="kc"><div class="kc-lbl">Resultado Bancário</div><div class="kc-val ${rec-desp>=0?'pos':'neg'}">${fmt(rec-desp)}</div></div>
  </div>

  <div class="tabs" id="bank-tabs">
    <button class="tab active" onclick="switchBankTab('${coId}',0,this)">Contas Cadastradas</button>
    <button class="tab" onclick="switchBankTab('${coId}',1,this)">Extrato Geral</button>
    <button class="tab" onclick="switchBankTab('${coId}',2,this)">Lançar Transação</button>
    <button class="tab" onclick="switchBankTab('${coId}',3,this)">Conciliação</button>
    <button class="tab" onclick="switchBankTab('${coId}',4,this)">Gráficos</button>
  </div>
  <div id="bank-tab-body">${rBankContas(coId)}</div>`;
}

function switchBankTab(coId,idx,el){
  document.querySelectorAll('#bank-tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); destroyCharts();
  const fns=[
    ()=>rBankContas(coId),
    ()=>rBankExtrato(coId),
    ()=>rBankLancar(coId),
    ()=>rBankConciliacao(coId),
    ()=>rBankGraficos(coId),
  ];
  document.getElementById('bank-tab-body').innerHTML=(fns[idx]||fns[0])();
  if(idx===4) setTimeout(()=>renderBankCharts(coId),50);
}

function showConciliacao(coId){
  // Switch to bancario tab (1), then conciliacao sub-tab (3)
  switchCoTab(coId,1,document.querySelectorAll('#co-tabs .tab')[1]);
  setTimeout(()=>switchBankTab(coId,3,document.querySelectorAll('#bank-tabs .tab')[3]),100);
}

    </div>`:''}

    <div class="fg fg-2">
      <div class="fgrp"><div class="flbl">Banco *</div>

function addConta(coId){
  const banco=document.getElementById('ac-banco')?.value;
  const conta=document.getElementById('ac-conta')?.value?.trim();
  const ag=document.getElementById('ac-ag')?.value?.trim();
  const saldo=parseFloat(document.getElementById('ac-saldo')?.value||0);
  if(!banco||!conta||!ag){ toast('Preencha banco, agência e conta','err'); return; }
  if(!DB.bancos[coId]) DB.bancos[coId]=[];
  DB.bancos[coId].push({
    id:'bk'+Date.now(), banco, agencia:ag, conta,
    nome:document.getElementById('ac-nome')?.value||banco,
    tipo:document.getElementById('ac-tipo')?.value||'Corrente',
    titular:document.getElementById('ac-titular')?.value||'',
    saldo, limite:parseFloat(document.getElementById('ac-limite')?.value||0),
    pix:document.getElementById('ac-pix')?.value||'',
    ativa:document.getElementById('ac-ativa')?.value==='true',
  });
  closeModal(); toast('Conta cadastrada com sucesso!','ok');
  document.getElementById('bank-tab-body').innerHTML=rBankContas(coId);
}

let _extratoFilter='';
function rBankExtrato(coId,contaFil=''){
  const contas=DB.bancos[coId]||[];

  if(contaFil) txs=txs.filter(t=>t.contaId===contaFil);
  txs=[...txs].sort((a,b)=>b.data.localeCompare(a.data));
  const rec=txs.filter(t=>t.tipo==='receita').reduce((a,t)=>a+t.val,0);
  const desp=txs.filter(t=>t.tipo==='despesa').reduce((a,t)=>a+t.val,0);
  const transf=txs.filter(t=>t.tipo==='transferencia').reduce((a,t)=>a+t.val,0);
  return `
  <div class="kg kg-4" style="margin-bottom:14px">
    <div class="kc"><div class="kc-lbl">Entradas</div><div class="kc-val pos">${fmt(rec)}</div></div>
    <div class="kc"><div class="kc-lbl">Saídas</div><div class="kc-val neg">${fmt(desp)}</div></div>
    <div class="kc"><div class="kc-lbl">Transferências</div><div class="kc-val">${fmt(transf)}</div></div>
    <div class="kc"><div class="kc-lbl">Saldo Período</div><div class="kc-val ${rec-desp>=0?'pos':'neg'}">${fmt(rec-desp)}</div></div>
  </div>
  <div class="tc">
    <div class="tc-hdr">
      <span class="tc-title">Extrato Bancário</span>
      <div class="tc-f">
        <select class="fs" id="ext-conta" onchange="filterExtrato('${coId}',this.value)">
          <option value="">Todas as contas</option>
          ${contas.map(b=>`<option value="${b.id}" ${b.id===contaFil?'selected':''}>${b.banco} — ${b.conta}</option>`).join('')}
        </select>
        <select class="fs" id="ext-tipo" onchange="filterExtrato('${coId}')">
          <option value="">Todos os tipos</option>
          <option value="receita">Receitas</option><option value="despesa">Despesas</option><option value="transferencia">Transferências</option>
        </select>
        <select class="fs" id="ext-conc" onchange="filterExtrato('${coId}')">
          <option value="">Todos</option>
          <option value="sim">Conciliados</option><option value="nao">Não conciliados</option>
        </select>
        <input class="fi" id="ext-q" placeholder="Pesquisar..." oninput="filterExtrato('${coId}')">
        <button class="bg-btn bsm" onclick="switchBankTab('${coId}',2,document.querySelectorAll('#bank-tabs .tab')[2])">+ Lançar</button>
        <button class="bg-btn bsm" onclick="toast('Exportando OFX/CSV...','info')">Exportar</button>
      </div>
    </div>
    <div id="ext-tbody">${rExtratoRows(txs,coId)}</div>
    <div class="t-sum">
      <span>Entradas: <span style="color:var(--green)">${fmt(rec)}</span></span>
      <span>Saídas: <span style="color:var(--red)">${fmt(desp)}</span></span>
      <span>Resultado: <span style="color:${rec-desp>=0?'var(--green)':'var(--red)'}">${fmt(rec-desp)}</span></span>
      <span>Total: <span>${txs.length} transações</span></span>

function rExtratoRows(txs,coId){
  if(!txs.length) return `<div class="t-empty">Nenhuma transação registrada</div>`;
  return txs.map(tx=>{
    const conta=(DB.bancos[coId]||[]).find(b=>b.id===tx.contaId);
    const ic={receita:'tx-c',despesa:'tx-d',transferencia:'tx-t'}[tx.tipo]||'tx-d';
    const arrow={receita:'▲',despesa:'▼',transferencia:'⇄'}[tx.tipo];
    return `<div class="bank-tx-row">
      <div class="bank-tx-icon ${ic}">${arrow}</div>
      <div class="bank-tx-desc">
        <div style="font-weight:500">${tx.desc}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">
          ${conta?conta.banco+' — '+conta.conta:'Conta não identificada'} · ${fmtD(tx.data)} · <span class="b" style="font-size:9px;background:rgba(255,255,255,.05);color:var(--muted)">${tx.cat}</span>
          ${tx.conciliado?'<span class="b b-ativo" style="font-size:9px;margin-left:4px">✓ Conciliado</span>':'<span class="b b-pendente" style="font-size:9px;margin-left:4px">Pendente</span>'}
        </div>
      </div>
      <div class="bank-tx-val" style="color:${tx.tipo==='receita'?'var(--green)':tx.tipo==='despesa'?'var(--red)':'var(--blue)'}">
        ${tx.tipo==='receita'?'+':tx.tipo==='despesa'?'-':''}${fmt(tx.val)}
      </div>
      <div class="flex g8" style="margin-left:8px">
        ${!tx.conciliado?`<button class="ib bsm" onclick="conciliarTx('${tx.id}','${coId}')" title="Marcar conciliado">✓</button>`:''}
        <button class="ib" onclick="modalEditTx('${tx.id}','${coId}')" title="Editar"><svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z"/></svg></button>
        <button class="ib" onclick="delTx('${tx.id}','${coId}')" title="Excluir"><svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h10M5 4V2h4v2M5.5 7v4M8.5 7v4M3 4l.7 8h6.6L11 4"/></svg></button>
      </div>
    </div>`;
  }).join('');
}
function filterExtrato(coId,contaOverride){
  const cF=contaOverride!==undefined?contaOverride:document.getElementById('ext-conta')?.value||'';
  const tF=document.getElementById('ext-tipo')?.value||'';
  const cncF=document.getElementById('ext-conc')?.value||'';
  const q=document.getElementById('ext-q')?.value?.toLowerCase()||'';
  let txs=DB.transacoes.filter(t=>t.coId===coId);
  if(cF) txs=txs.filter(t=>t.contaId===cF);
  if(tF) txs=txs.filter(t=>t.tipo===tF);
  if(cncF==='sim') txs=txs.filter(t=>t.conciliado);
  if(cncF==='nao') txs=txs.filter(t=>!t.conciliado);
  if(q) txs=txs.filter(t=>t.desc.toLowerCase().includes(q)||t.cat.toLowerCase().includes(q));
  txs=[...txs].sort((a,b)=>b.data.localeCompare(a.data));
  const el=document.getElementById('ext-tbody');
  if(el) el.innerHTML=rExtratoRows(txs,coId);
}
function filterExtratoByAccount(contaId){
  const sel=document.getElementById('ext-conta');

function conciliarTx(txId,coId){
  const tx=DB.transacoes.find(t=>t.id===txId);
  if(tx){ tx.conciliado=true; toast('Transação conciliada!','ok'); filterExtrato(coId); updateNotifDot(); }
}
function delTx(txId,coId){
  if(!confirm('Excluir esta transação?')) return;
  const tx=DB.transacoes.find(t=>t.id===txId);
  if(tx){
    // Estornar saldo na conta
    const conta=(DB.bancos[coId]||[]).find(b=>b.id===tx.contaId);
    if(conta){
      if(tx.tipo==='receita') conta.saldo-=tx.val;
      else if(tx.tipo==='despesa') conta.saldo+=tx.val;
    }
  }
  DB.transacoes=DB.transacoes.filter(t=>t.id!==txId);
  toast('Transação excluída'); filterExtrato(coId);
}

function salvarTransacao(coId){
  const contaId=document.getElementById('lt-conta')?.value;
  const tipo=document.getElementById('lt-tipo')?.value;
  const desc=document.getElementById('lt-desc')?.value?.trim();
  const val=parseFloat(document.getElementById('lt-val')?.value||0);
  const data=document.getElementById('lt-data')?.value;
  if(!contaId){ toast('Selecione uma conta','err'); return; }
  if(!desc){ toast('Preencha a descrição','err'); return; }
  if(!val||val<=0){ toast('Preencha o valor','err'); return; }
  if(!data){ toast('Preencha a data','err'); return; }
  if(tipo==='transferencia'){
    const destino=document.getElementById('lt-destino')?.value;
    if(destino===contaId){ toast('Conta de destino deve ser diferente da origem','err'); return; }
  }

  // Atualizar saldo da conta
  const conta=(DB.bancos[coId]||[]).find(b=>b.id===contaId);
  if(conta){
    if(tipo==='receita') conta.saldo+=val;
    else if(tipo==='despesa') conta.saldo-=val;
    else if(tipo==='transferencia'){
      conta.saldo-=val;
      const dest=(DB.bancos[coId]||[]).find(b=>b.id===document.getElementById('lt-destino')?.value);
      if(dest) dest.saldo+=val;
    }
  }

  const novaTx={
    id:'tx'+Date.now(), coId, contaId, tipo,
    desc, val, data,
    cat:document.getElementById('lt-cat')?.value||'Outros',
    forma:document.getElementById('lt-forma')?.value||'PIX',
    ref:document.getElementById('lt-ref')?.value||'',
    obs:document.getElementById('lt-obs')?.value||'',
    conciliado:document.getElementById('lt-conc')?.value==='true',
  };
  DB.transacoes.push(novaTx);

  // Adicionar notificação
  if(tipo==='receita'){
    DB.notificacoes.unshift({id:++DB.nextId,tipo:'banco',icon:'🏦',color:'var(--green)',
      msg:`Receita registrada — ${co(coId)?.name}`,sub:`${fmt(val)} · ${desc}`,
      data:data,lida:false,coId});
    updateNotifDot();
  }

  toast('Transação registrada e saldo atualizado!','ok');
  switchBankTab(coId,1,document.querySelectorAll('#bank-tabs .tab')[1]);
}

      <input class="finp" type="number" id="cx-inv" value="${c.caixa_inv}" style="margin-bottom:8px">
    </div>
    <div class="cx-card"><div class="cx-lbl">Caixa Dividendos</div><div class="cx-val acc">${fmtK(c.caixa_div)}</div>
      <input class="finp" type="number" id="cx-div" value="${c.caixa_div}" style="margin-bottom:8px">
      <div class="cx-meta">Próxima distribuição: ${fmtD(c.div_data)}</div>
      <input class="finp" type="date" id="cx-div-dt" value="${c.div_data||''}">
    </div>
  </div>
  <div class="fa">
    <button class="bp" onclick="saveCoConfig('${coId}')">Salvar Configurações</button>
    <button class="bg-btn" onclick="showCo('${coId}')">Cancelar</button>
  </div></div>`;
}
function saveCoConfig(coId){
  const c=co(coId); if(!c) return;
  c.name=document.getElementById('cc-nome')?.value||c.name;
  c.cnpj=document.getElementById('cc-cnpj')?.value||c.cnpj;
  c.ie=document.getElementById('cc-ie')?.value||'';
  c.im=document.getElementById('cc-im')?.value||'';
  c.email=document.getElementById('cc-email')?.value||'';
  c.tel=document.getElementById('cc-tel')?.value||'';
  c.resp=document.getElementById('cc-resp')?.value||'';
  c.fundacao=document.getElementById('cc-fund')?.value||'';
  c.end=document.getElementById('cc-end')?.value||'';
  c.regime=document.getElementById('cc-regime')?.value||c.regime;
  c.aliq=parseFloat(document.getElementById('cc-aliq')?.value)||c.aliq;
  c.cnae=document.getElementById('cc-cnae')?.value||'';
  c.banco_principal=document.getElementById('cc-banco')?.value||'';
  c.pix=document.getElementById('cc-pix')?.value||'';
  c.caixa_emg=parseFloat(document.getElementById('cx-emg')?.value||c.caixa_emg);
  c.caixa_emg_meta=parseFloat(document.getElementById('cx-emg-meta')?.value||c.caixa_emg_meta);
  c.caixa_inv=parseFloat(document.getElementById('cx-inv')?.value||c.caixa_inv);
  c.caixa_div=parseFloat(document.getElementById('cx-div')?.value||c.caixa_div);
  c.div_data=document.getElementById('cx-div-dt')?.value||'';
  buildSidebar(); toast('Configurações da empresa salvas!','ok');
}

// ── Charts empresa ────────────────────────────────────
function rCoCharts(coId,tabIdx){
  const c=co(coId); if(!c) return;
  const labels=getLabels();
  if(tabIdx===0){
    mkChart('ch-co-fat','bar',{labels,datasets:[
      {label:'Faturamento',data:getSlice(c.fat),backgroundColor:getSlice(c.fat).map((_,i)=>i===getSlice(c.fat).length-1?c.color+'cc':c.color+'33'),borderRadius:3},
      {label:'Despesas',   data:getSlice(c.desp),backgroundColor:'rgba(239,68,68,.42)',borderRadius:3},
    ]},{leg:true});
    const res=c.fat.map((v,i)=>v-c.desp[i]-Math.round(v*(c.aliq/100)));
    mkChart('ch-co-res','bar',{labels,datasets:[{data:getSlice(res),backgroundColor:getSlice(res).map(v=>v>=0?'rgba(22,163,74,.65)':'rgba(239,68,68,.6)'),borderRadius:3}]},{});
  }
  if(tabIdx===6){
    mkChart('ch-co-rel','bar',{labels,datasets:[
      {label:'Faturamento',data:getSlice(c.fat),backgroundColor:c.color+'88',borderRadius:3},
      {label:'Despesas',   data:getSlice(c.desp),backgroundColor:'rgba(239,68,68,.42)',borderRadius:3},
    ]},{leg:true});
  }
}

</script>
